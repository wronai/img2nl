[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "uri2img2nl"
version = "0.1.0"
description = "img2nl:// URI query layer"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = ["img2nl>=0.1.0"]

[project.scripts]
uri2img2nl = "uri2img2nl.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
