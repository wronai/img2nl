[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cli2img2nl"
version = "0.1.0"
description = "Shell adapter for img2nl DSL"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = ["dsl2img2nl>=0.1.0"]

[project.scripts]
cli2img2nl = "cli2img2nl.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
